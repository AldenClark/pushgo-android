name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_API_LEVEL: "31"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse SemVer tag context
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-beta\.([1-9][0-9]*)$ ]]; then
            kind="beta"
            semver="${BASH_REMATCH[1]}"
            changelog_section="Unreleased"
            prerelease="true"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            kind="release"
            semver="${BASH_REMATCH[1]}"
            changelog_section="v${semver}"
            prerelease="false"
          else
            echo "Unsupported tag format: $tag"
            echo "Allowed formats: vX.Y.Z or vX.Y.Z-beta.N"
            exit 1
          fi

          {
            echo "kind=$kind"
            echo "tag_name=$tag"
            echo "semver=$semver"
            echo "changelog_section=$changelog_section"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release notes from release/RELEASE_NOTES
        shell: bash
        run: |
          set -euo pipefail
          release_notes_file="release/RELEASE_NOTES.md"
          section="${{ steps.tag.outputs.changelog_section }}"

          if [[ ! -f "$release_notes_file" ]]; then
            echo "Missing $release_notes_file"
            exit 1
          fi

          section_body="$(awk -v sec="$section" '
            BEGIN { in_section = 0 }
            /^## \[/ {
              if (in_section == 1) exit
              if ($0 ~ "^## \\[" sec "\\]([[:space:]]|$|[[:space:]]-)") {
                in_section = 1
                next
              }
            }
            in_section == 1 { print }
          ' "$release_notes_file")"

          section_body="$(printf "%s\n" "$section_body" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' )"
          if [[ -z "$section_body" ]]; then
            echo "RELEASE_NOTES section not found or empty: [$section]"
            exit 1
          fi

          release_notes_link="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/${release_notes_file}"
          release_body="# ${GITHUB_REF_NAME}"$'\n\n'"Source: [${release_notes_file}](${release_notes_link}) [$section]"$'\n\n'"$section_body"

          {
            echo "RELEASE_CHANGELOG_BODY<<__PUSHGO_ANDROID_RELEASE_BODY_EOF__"
            printf "%s\n" "$release_body"
            echo "__PUSHGO_ANDROID_RELEASE_BODY_EOF__"
          } >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "ndk;29.0.13846066"

      - name: Export Android build tools
        shell: bash
        run: |
          set -euo pipefail
          build_tools_dir="${ANDROID_SDK_ROOT}/build-tools/36.0.0"
          if [ ! -x "${build_tools_dir}/apksigner" ]; then
            echo "apksigner not found at ${build_tools_dir}/apksigner" >&2
            exit 1
          fi
          echo "${build_tools_dir}" >> "$GITHUB_PATH"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/quinn-jni -> native/quinn-jni/target

      - name: Install cargo-ndk
        shell: bash
        run: cargo install cargo-ndk --locked

      - name: Prepare release signing
        shell: bash
        run: |
          set -euo pipefail
          required_secrets=(
            PUSHGO_RELEASE_KEYSTORE_B64
            PUSHGO_RELEASE_STORE_PASSWORD
            PUSHGO_RELEASE_KEY_ALIAS
            PUSHGO_RELEASE_KEY_PASSWORD
          )
          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name:-}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done
          mkdir -p "$GITHUB_WORKSPACE/.ci"
          echo "$PUSHGO_RELEASE_KEYSTORE_B64" | base64 --decode > "$GITHUB_WORKSPACE/.ci/release.keystore"
          {
            echo "PUSHGO_RELEASE_STORE_FILE=$GITHUB_WORKSPACE/.ci/release.keystore"
            echo "PUSHGO_RELEASE_STORE_PASSWORD=$PUSHGO_RELEASE_STORE_PASSWORD"
            echo "PUSHGO_RELEASE_KEY_ALIAS=$PUSHGO_RELEASE_KEY_ALIAS"
            echo "PUSHGO_RELEASE_KEY_PASSWORD=$PUSHGO_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
          if [ -n "${PUSHGO_PRIVATE_CERT_PIN_SHA256:-}" ]; then
            echo "PUSHGO_PRIVATE_CERT_PIN_SHA256=$PUSHGO_PRIVATE_CERT_PIN_SHA256" >> "$GITHUB_ENV"
          fi
        env:
          PUSHGO_RELEASE_KEYSTORE_B64: ${{ secrets.PUSHGO_RELEASE_KEYSTORE_B64 }}
          PUSHGO_RELEASE_STORE_PASSWORD: ${{ secrets.PUSHGO_RELEASE_STORE_PASSWORD }}
          PUSHGO_RELEASE_KEY_ALIAS: ${{ secrets.PUSHGO_RELEASE_KEY_ALIAS }}
          PUSHGO_RELEASE_KEY_PASSWORD: ${{ secrets.PUSHGO_RELEASE_KEY_PASSWORD }}
          PUSHGO_PRIVATE_CERT_PIN_SHA256: ${{ secrets.PUSHGO_PRIVATE_CERT_PIN_SHA256 }}

      - name: Read release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < <(./gradlew -q :app:printReleaseVersionInfo -Ppushgo.versionName=${{ steps.tag.outputs.tag_name }})

      - name: Build release APKs
        shell: bash
        run: ./gradlew --no-daemon clean :app:assembleRelease -Ppushgo.versionName=${{ steps.tag.outputs.tag_name }}
        env:
          PUSHGO_UPDATE_FEED_URL: ${{ vars.PUSHGO_UPDATE_FEED_URL }}
          PUSHGO_UPDATE_FEED_PUBLIC_KEY_B64: ${{ secrets.PUSHGO_UPDATE_FEED_PUBLIC_KEY_B64 }}
          PUSHGO_UPDATE_FEED_ECDSA_P256_PUBLIC_KEY_B64: ${{ secrets.PUSHGO_UPDATE_FEED_ECDSA_P256_PUBLIC_KEY_B64 }}

      - name: Verify signed release artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          apk_files=(app/build/outputs/apk/release/*.apk)
          if [ ${#apk_files[@]} -eq 0 ]; then
            echo "No release APKs found" >&2
            exit 1
          fi
          for file in "${apk_files[@]}"; do
            apksigner verify --verbose --print-certs "$file"
          done

      - name: Package release artifacts
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version_name="${{ steps.version.outputs.versionName }}"
          prefix="pushgo-android-${version_name}"
          mkdir -p dist

          shopt -s nullglob
          for file in app/build/outputs/apk/release/*.apk; do
            base="$(basename "$file")"
            normalized_base="${base#app-}"
            normalized_base="${normalized_base/-unsigned/}"
            cp "$file" "dist/${prefix}-${normalized_base}"
          done
          shopt -u nullglob

          {
            echo "tag=${GITHUB_REF_NAME}"
            echo "commit=${GITHUB_SHA}"
            echo "versionName=${version_name}"
            echo "versionCode=${{ steps.version.outputs.versionCode }}"
            echo "signingEnabled=true"
          } > dist/BUILD_INFO.txt

          (
            cd dist
            sha256sum * > SHA256SUMS.txt
          )

      - name: Prepare update feed signing key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci"
          if [ -n "${PUSHGO_UPDATE_FEED_SIGNING_KEY_B64:-}" ]; then
            echo "$PUSHGO_UPDATE_FEED_SIGNING_KEY_B64" | base64 --decode > "$GITHUB_WORKSPACE/.ci/update-feed-signing-key.pem"
            echo "PUSHGO_UPDATE_FEED_SIGNING_KEY_FILE=$GITHUB_WORKSPACE/.ci/update-feed-signing-key.pem" >> "$GITHUB_ENV"
          fi
          if [ -n "${PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_B64:-}" ]; then
            echo "$PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_B64" | base64 --decode > "$GITHUB_WORKSPACE/.ci/update-feed-ecdsa-signing-key.pem"
            echo "PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_FILE=$GITHUB_WORKSPACE/.ci/update-feed-ecdsa-signing-key.pem" >> "$GITHUB_ENV"
          fi
        env:
          PUSHGO_UPDATE_FEED_SIGNING_KEY_B64: ${{ secrets.PUSHGO_UPDATE_FEED_SIGNING_KEY_B64 }}
          PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_B64: ${{ secrets.PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_B64 }}

      - name: Generate update feed artifacts
        shell: bash
        run: |
          set -euo pipefail
          track="stable"
          if [[ "${{ steps.tag.outputs.kind }}" == "beta" ]]; then
            track="beta"
          fi
          base_url="${PUSHGO_UPDATE_BASE_URL:-}"
          if [[ -z "$base_url" ]]; then
            echo "Missing required PUSHGO_UPDATE_BASE_URL for server-hosted update feed URLs." >&2
            exit 1
          fi
          cmd=(
            scripts/generate_update_feed.sh
            "$track"
            dist
            --tag "${GITHUB_REF_NAME}"
            --repo "${GITHUB_REPOSITORY}"
            --base-url "$base_url"
            --existing-feed "release/update-feed-v1.json"
            --repo-feed-path ""
          )
          if [[ -n "${PUSHGO_UPDATE_FEED_SIGNING_KEY_FILE:-}" ]]; then
            cmd+=(--private-key-file "${PUSHGO_UPDATE_FEED_SIGNING_KEY_FILE}")
          fi
          if [[ -n "${PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_FILE:-}" ]]; then
            cmd+=(--ecdsa-private-key-file "${PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_FILE}")
          fi
          "${cmd[@]}"
        env:
          PUSHGO_UPDATE_BASE_URL: ${{ vars.PUSHGO_UPDATE_BASE_URL != '' && vars.PUSHGO_UPDATE_BASE_URL || secrets.PUSHGO_UPDATE_BASE_URL }}

      - name: Enforce ABI package matrix artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          apk_files=(dist/*.apk)
          shopt -u nullglob
          if [[ ${#apk_files[@]} -eq 0 ]]; then
            echo "No APK artifacts found under dist/" >&2
            exit 1
          fi

          find_match() {
            local regex="$1"
            for file in "${apk_files[@]}"; do
              local name
              name="$(basename "$file")"
              if [[ "$name" =~ $regex ]]; then
                echo "$name"
                return 0
              fi
            done
            return 1
          }

          v8a_file="$(find_match 'arm64-v8a|aarch64' || true)"
          v7a_file="$(find_match 'armeabi-v7a|armv7|arm-v7a' || true)"
          x86_file="$(find_match 'x86_64|x86' || true)"
          universal_file="$(find_match 'universal|all' || true)"

          if [[ -z "$v8a_file" || -z "$v7a_file" || -z "$x86_file" || -z "$universal_file" ]]; then
            echo "ABI package matrix check failed. Required APK variants: v8a / v7a / x86 / universal." >&2
            printf 'Detected APK files:\n%s\n' "${apk_files[*]}" >&2
            echo "Detected matches: v8a=${v8a_file:-<missing>} v7a=${v7a_file:-<missing>} x86=${x86_file:-<missing>} universal=${universal_file:-<missing>}" >&2
            exit 1
          fi

          echo "ABI package matrix ready:"
          echo "  v8a      -> $v8a_file"
          echo "  v7a      -> $v7a_file"
          echo "  x86      -> $x86_file"
          echo "  universal-> $universal_file"

      - name: Generate update deploy bundle
        shell: bash
        run: |
          set -euo pipefail
          cmd=(
            scripts/generate_update_deploy_config.sh
            dist
            --repo "${GITHUB_REPOSITORY}"
            --tag "${GITHUB_REF_NAME}"
          )
          if [[ -n "${PUSHGO_UPDATE_DEPLOY_PATH:-}" ]]; then
            cmd+=(--deploy-path "${PUSHGO_UPDATE_DEPLOY_PATH}")
          fi
          "${cmd[@]}"
        env:
          PUSHGO_UPDATE_DEPLOY_PATH: ${{ secrets.PUSHGO_UPDATE_DEPLOY_PATH }}

      - name: Verify update feed artifacts
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify_update_feed.sh dist/update-feed-v1.json
          jq -e '
            .payload.entries
            | map(
                (.packages | type == "object")
                and (.packages.v8a | type == "object")
                and (.packages.v7a | type == "object")
                and (.packages.x86 | type == "object")
                and (.packages.universal | type == "object")
              )
            | all
          ' dist/update-feed-v1.json >/dev/null
          echo "Feed schema gate passed: packages.v8a/v7a/x86/universal all present."
          base_url="${PUSHGO_UPDATE_BASE_URL:-}"
          if [[ -z "$base_url" ]]; then
            echo "Missing required PUSHGO_UPDATE_BASE_URL for URL prefix verification." >&2
            exit 1
          fi
          jq -e --arg base "${base_url%/}" '
            .payload.entries
            | map(
                . as $entry
                | (($entry.channel == "stable") or ($entry.channel == "beta"))
                and (
                  [
                    $entry.packages.v8a.apkUrl,
                    $entry.packages.v7a.apkUrl,
                    $entry.packages.x86.apkUrl,
                    $entry.packages.universal.apkUrl
                  ]
                  | all(type == "string" and startswith($base + "/" + $entry.channel + "/" + $entry.versionName + "/"))
                )
              )
            | all
          ' dist/update-feed-v1.json >/dev/null
          echo "Feed URL gate passed: all package URLs point to ${base_url%/}/{stable|beta}/{version}/..."
        env:
          PUSHGO_UPDATE_BASE_URL: ${{ vars.PUSHGO_UPDATE_BASE_URL != '' && vars.PUSHGO_UPDATE_BASE_URL || secrets.PUSHGO_UPDATE_BASE_URL }}

      - name: Prepare update deploy SSH key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64:-}" ]; then
            exit 0
          fi
          mkdir -p "$GITHUB_WORKSPACE/.ci"
          echo "$PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64" | base64 --decode > "$GITHUB_WORKSPACE/.ci/update-deploy-key"
          chmod 600 "$GITHUB_WORKSPACE/.ci/update-deploy-key"
          echo "PUSHGO_UPDATE_DEPLOY_SSH_KEY_FILE=$GITHUB_WORKSPACE/.ci/update-deploy-key" >> "$GITHUB_ENV"
        env:
          PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64: ${{ secrets.PUSHGO_UPDATE_DEPLOY_SSH_KEY_B64 }}

      - name: Publish update artifacts to update host
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PUSHGO_UPDATE_DEPLOY_HOST:-}" || -z "${PUSHGO_UPDATE_DEPLOY_USER:-}" || -z "${PUSHGO_UPDATE_DEPLOY_PATH:-}" ]]; then
            echo "Skip update publish: deploy host/user/path is not fully configured."
            exit 0
          fi
          track="stable"
          if [[ "${{ steps.tag.outputs.kind }}" == "beta" ]]; then
            track="beta"
          fi
          scripts/publish_update_artifacts.sh \
            dist \
            "${PUSHGO_UPDATE_DEPLOY_USER}@${PUSHGO_UPDATE_DEPLOY_HOST}" \
            "${PUSHGO_UPDATE_DEPLOY_PATH}" \
            "${track}"
        env:
          PUSHGO_UPDATE_DEPLOY_HOST: ${{ secrets.PUSHGO_UPDATE_DEPLOY_HOST }}
          PUSHGO_UPDATE_DEPLOY_USER: ${{ secrets.PUSHGO_UPDATE_DEPLOY_USER }}
          PUSHGO_UPDATE_DEPLOY_PATH: ${{ secrets.PUSHGO_UPDATE_DEPLOY_PATH }}

      - name: Create or update GitHub release
        id: github_release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_root="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          prerelease="${{ steps.tag.outputs.prerelease }}"
          release_payload="$(jq -cn \
            --arg tag_name "${GITHUB_REF_NAME}" \
            --arg target_commitish "${GITHUB_SHA}" \
            --arg name "${GITHUB_REF_NAME}" \
            --arg body "${RELEASE_CHANGELOG_BODY}" \
            --argjson prerelease "${prerelease}" \
            '{
              tag_name: $tag_name,
              target_commitish: $target_commitish,
              name: $name,
              body: $body,
              draft: false,
              prerelease: $prerelease,
              generate_release_notes: false
            }')"

          release_lookup_file="$(mktemp)"
          release_status="$(
            curl -sSL -o "${release_lookup_file}" -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases/tags/${GITHUB_REF_NAME}" || true
          )"

          if [[ "${release_status}" == "200" ]]; then
            release_id="$(jq -r '.id' "${release_lookup_file}")"
            release_response_file="$(mktemp)"
            curl -fsSL -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases/${release_id}" \
              -d "${release_payload}" >"${release_response_file}"
          elif [[ "${release_status}" == "404" ]]; then
            release_response_file="$(mktemp)"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_root}/releases" \
              -d "${release_payload}" >"${release_response_file}"
          else
            echo "Failed to look up release for tag ${GITHUB_REF_NAME}, status=${release_status}" >&2
            cat "${release_lookup_file}" >&2
            exit 1
          fi

          release_id="$(jq -r '.id' "${release_response_file}")"
          upload_url="$(jq -r '.upload_url' "${release_response_file}" | sed 's/{?name,label}//')"
          html_url="$(jq -r '.html_url' "${release_response_file}")"

          {
            echo "release_id=${release_id}"
            echo "upload_url=${upload_url}"
            echo "html_url=${html_url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload GitHub release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          api_root="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          release_id="${{ steps.github_release.outputs.release_id }}"
          upload_url="${{ steps.github_release.outputs.upload_url }}"

          shopt -s nullglob
          asset_files=(dist/*.apk dist/BUILD_INFO.txt dist/SHA256SUMS.txt)
          shopt -u nullglob
          if [[ ${#asset_files[@]} -eq 0 ]]; then
            echo "No release assets found under dist/" >&2
            exit 1
          fi

          assets_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_root}/releases/${release_id}/assets?per_page=100")"

          for file in "${asset_files[@]}"; do
            asset_name="$(basename "${file}")"
            while IFS= read -r asset_id; do
              [[ -z "${asset_id}" ]] && continue
              curl -fsSL -X DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${api_root}/releases/assets/${asset_id}" >/dev/null
            done < <(printf '%s' "${assets_json}" | jq -r --arg name "${asset_name}" '.[] | select(.name == $name) | .id')

            case "${file}" in
              *.apk) content_type="application/vnd.android.package-archive" ;;
              *) content_type="text/plain; charset=utf-8" ;;
            esac

            encoded_asset_name="$(jq -rn --arg value "${asset_name}" '$value|@uri')"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: ${content_type}" \
              --data-binary @"${file}" \
              "${upload_url}?name=${encoded_asset_name}" >/dev/null
          done

      - name: Persist update feed to repository
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PUSHGO_UPDATE_BASE_URL:-}" ]]; then
            echo "Missing required PUSHGO_UPDATE_BASE_URL while persisting repository feed." >&2
            exit 1
          fi

          default_branch="${{ github.event.repository.default_branch }}"
          track="stable"
          if [[ "${{ steps.tag.outputs.kind }}" == "beta" ]]; then
            track="beta"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            branch_name="persist-update-feed-${GITHUB_RUN_ID}-${attempt}"
            git fetch origin "${default_branch}"
            git switch --force-create "${branch_name}" "origin/${default_branch}"

            cmd=(
              scripts/generate_update_feed.sh
              "${track}"
              dist
              --tag "${GITHUB_REF_NAME}"
              --repo "${GITHUB_REPOSITORY}"
              --base-url "${PUSHGO_UPDATE_BASE_URL}"
              --repo-feed-path "release/update-feed-v1.json"
            )
            if [[ -n "${PUSHGO_UPDATE_FEED_SIGNING_KEY_FILE:-}" ]]; then
              cmd+=(--private-key-file "${PUSHGO_UPDATE_FEED_SIGNING_KEY_FILE}")
            fi
            if [[ -n "${PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_FILE:-}" ]]; then
              cmd+=(--ecdsa-private-key-file "${PUSHGO_UPDATE_FEED_ECDSA_SIGNING_KEY_FILE}")
            fi
            "${cmd[@]}"

            if git diff --quiet -- release/update-feed-v1.json; then
              echo "Repository update feed is already current."
              exit 0
            fi

            git add release/update-feed-v1.json
            git commit -m "chore(release): persist update feed state for ${GITHUB_REF_NAME}"

            if git push origin "HEAD:${default_branch}"; then
              echo "Persisted update feed to ${default_branch}."
              exit 0
            fi

            echo "Push rejected while persisting update feed, retrying with the latest ${default_branch}..." >&2
          done

          echo "Failed to persist update feed after multiple attempts." >&2
          exit 1
        env:
          PUSHGO_UPDATE_BASE_URL: ${{ vars.PUSHGO_UPDATE_BASE_URL != '' && vars.PUSHGO_UPDATE_BASE_URL || secrets.PUSHGO_UPDATE_BASE_URL }}
